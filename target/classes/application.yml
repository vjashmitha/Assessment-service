server:
  port: 8083

spring:
  application:
    name: ASSESSMENT-SERVICE

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

aws:
  region: eu-north-1
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: kodemis3bucket555

dynamodb:
  endpoint: http://localhost:8000
  table:
    assignments: assignments
    submissions: submissions

jwt:
  secret: mySuperSecretKeyForDevelopment123456789
  expiration: 86400000

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

services:
  user-service: http://localhost:8081
  course-service: http://localhost:9200
  enrollment-service: http://localhost:8084
  notification-service: http://localhost:8095
  auth-service: http://localhost:8090

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}